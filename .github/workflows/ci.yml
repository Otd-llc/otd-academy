name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm prisma validate
      - run: pnpm next build
        env:
          DATABASE_URL: postgresql://stub:stub@stub/stub
          DIRECT_URL: postgresql://stub:stub@stub/stub
          AUTH_SECRET: "stub-secret-32-chars-long-padding-x"
          AUTH_GOOGLE_ID: stub
          AUTH_GOOGLE_SECRET: stub
          ALLOWED_EMAILS: "stub@stub"
          R2_ENABLED: "false"
      - run: pnpm vitest run
        env:
          # DB-backed tests need a REAL seeded Postgres — set these repo secrets to
          # a seeded Neon branch (it inherits the schema + seed data). Until then
          # the DB tests fail with "DATABASE_URL not set".
          DATABASE_URL: ${{ secrets.NEON_TEST_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.NEON_TEST_DIRECT_URL }}
          # Non-DB env so `@/env` validation passes (mirrors the build step).
          AUTH_SECRET: "stub-secret-32-chars-long-padding-x"
          AUTH_GOOGLE_ID: stub
          AUTH_GOOGLE_SECRET: stub
          ALLOWED_EMAILS: "seed@example.com"
          R2_ENABLED: "false"
