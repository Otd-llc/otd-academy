name: CI
on:
  pull_request:
  push:
    branches: [main]
# All runs share ONE persistent ci-test Neon branch, so concurrent runs race on
# the seeded fixtures (TransactionWriteConflict, drift). Serialize them: queue
# instead of cancelling so each run executes against the branch alone.
concurrency:
  group: ci-shared-test-db
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm prisma validate
      - run: pnpm next build
        env:
          DATABASE_URL: postgresql://stub:stub@stub/stub
          DIRECT_URL: postgresql://stub:stub@stub/stub
          AUTH_SECRET: "stub-secret-32-chars-long-padding-x"
          AUTH_GOOGLE_ID: stub
          AUTH_GOOGLE_SECRET: stub
          ALLOWED_EMAILS: "stub@stub"
          R2_ENABLED: "false"
      # Keep the test branch's schema current as migrations are added (the branch
      # carries the seed + KiCad data, which CI can't regenerate). No-op when the
      # branch is already up to date.
      # The ci-test Neon compute auto-suspends when idle; the first connection
      # has to wake it, which can outrun a single migrate's connect timeout
      # (P1001). Retry so a cold branch wakes instead of failing the run.
      - name: Migrate the test DB (waking it if cold)
        run: |
          for i in 1 2 3 4 5 6; do
            pnpm exec prisma migrate deploy && exit 0
            echo "test DB not reachable yet (attempt $i) — waiting 10s…"
            sleep 10
          done
          echo "test DB still unreachable after retries" >&2
          exit 1
        env:
          DIRECT_URL: ${{ secrets.NEON_TEST_DIRECT_URL }}
      # Reset the seeded fixtures to a KNOWN state before tests. The ci-test
      # branch is shared + persistent, so earlier runs that advance demo data
      # (boards ASSEMBLED -> BROUGHT_UP, etc.) leave drift behind and break the
      # DB-backed smoke tests (m9a-checkpoint, load-gate-context). The seed is
      # idempotent (upserts; resets board status) and does NOT touch the branch's
      # KiCad lib data, so this restores the fixtures without regenerating them.
      - run: pnpm db:seed
        env:
          DATABASE_URL: ${{ secrets.NEON_TEST_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.NEON_TEST_DIRECT_URL }}
          AUTH_SECRET: "stub-secret-32-chars-long-padding-x"
          AUTH_GOOGLE_ID: stub
          AUTH_GOOGLE_SECRET: stub
          ALLOWED_EMAILS: "seed@example.com"
          R2_ENABLED: "false"
      - run: pnpm vitest run
        env:
          # DB-backed tests need a REAL seeded Postgres — these repo secrets point
          # at the seeded `ci-test` Neon branch (it inherits the schema + seed data).
          DATABASE_URL: ${{ secrets.NEON_TEST_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.NEON_TEST_DIRECT_URL }}
          # Non-DB env so `@/env` validation passes (mirrors the build step).
          AUTH_SECRET: "stub-secret-32-chars-long-padding-x"
          AUTH_GOOGLE_ID: stub
          AUTH_GOOGLE_SECRET: stub
          ALLOWED_EMAILS: "seed@example.com"
          R2_ENABLED: "false"
