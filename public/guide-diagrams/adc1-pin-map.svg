<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" role="img"
     aria-label="ADC pin map: GPIO 1 to 10 are ADC1 and stay usable for analog input; GPIO 11 to 20 are ADC2 and are claimed by the radio, so they read garbage while Wi-Fi is on"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">

  <!-- title -->
  <text x="390" y="42" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Analog input? Use an ADC1 pin.</text>

  <!-- ── Row 1 · ADC1 (usable) ──────────────────────────────────────────────── -->
  <text x="110" y="94" text-anchor="start" fill="#4a8fff" font-size="12" font-weight="700">ADC1 — usable (GPIO 1–10)</text>
  <g fill="rgba(74,143,255,0.12)" stroke="#4a8fff" stroke-width="1.5">
    <rect x="110" y="104" width="48" height="40" rx="5"/>
    <rect x="170" y="104" width="48" height="40" rx="5"/>
    <rect x="230" y="104" width="48" height="40" rx="5"/>
    <rect x="290" y="104" width="48" height="40" rx="5"/>
    <rect x="350" y="104" width="48" height="40" rx="5"/>
    <rect x="410" y="104" width="48" height="40" rx="5"/>
    <rect x="470" y="104" width="48" height="40" rx="5"/>
    <rect x="530" y="104" width="48" height="40" rx="5"/>
    <rect x="590" y="104" width="48" height="40" rx="5"/>
    <rect x="650" y="104" width="48" height="40" rx="5"/>
  </g>
  <g fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">
    <text x="134" y="129">1</text><text x="194" y="129">2</text><text x="254" y="129">3</text><text x="314" y="129">4</text><text x="374" y="129">5</text>
    <text x="434" y="129">6</text><text x="494" y="129">7</text><text x="554" y="129">8</text><text x="614" y="129">9</text><text x="674" y="129">10</text>
  </g>

  <!-- ── Row 2 · ADC2 (radio-claimed) ───────────────────────────────────────── -->
  <text x="110" y="194" text-anchor="start" fill="#ef5350" font-size="12" font-weight="700">ADC2 — radio-claimed (GPIO 11–20)</text>
  <g fill="#0b0f1a" stroke="#8a8a8a" stroke-width="1">
    <rect x="110" y="204" width="48" height="40" rx="5"/>
    <rect x="170" y="204" width="48" height="40" rx="5"/>
    <rect x="230" y="204" width="48" height="40" rx="5"/>
    <rect x="290" y="204" width="48" height="40" rx="5"/>
    <rect x="350" y="204" width="48" height="40" rx="5"/>
    <rect x="410" y="204" width="48" height="40" rx="5"/>
    <rect x="470" y="204" width="48" height="40" rx="5"/>
    <rect x="530" y="204" width="48" height="40" rx="5"/>
    <rect x="590" y="204" width="48" height="40" rx="5"/>
    <rect x="650" y="204" width="48" height="40" rx="5"/>
  </g>
  <g fill="#8a8a8a" font-size="13" font-weight="400" text-anchor="middle">
    <text x="134" y="229">11</text><text x="194" y="229">12</text><text x="254" y="229">13</text><text x="314" y="229">14</text><text x="374" y="229">15</text>
    <text x="434" y="229">16</text><text x="494" y="229">17</text><text x="554" y="229">18</text><text x="614" y="229">19</text><text x="674" y="229">20</text>
  </g>

  <!-- bottom note -->
  <text x="390" y="280" text-anchor="middle" fill="#8a8a8a" font-size="11">Wi-Fi borrows ADC2's converter — those pins read garbage while the radio is on.</text>
</svg>
