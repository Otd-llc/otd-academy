<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img"
     aria-label="Bring-up is a ladder of five rungs in order: no shorts, then the 3.3 V rail, then LED1 lit, then the board enumerates, then LED2 blinks. If any rung fails, stop and fix it before the next. All five means the board is brought up."
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">

  <!-- title (top gutter) -->
  <text x="390" y="28" text-anchor="middle" fill="#c8963e" font-size="12" font-weight="700">Bring-up is a ladder — prove each rung before you trust the next</text>

  <!-- five rungs (subject, centred x 285–495) -->
  <g>
    <rect x="285" y="52"  width="210" height="40" rx="6" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="2"/>
    <text x="390" y="77"  text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">1 · NO SHORTS</text>
    <rect x="285" y="110" width="210" height="40" rx="6" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="2"/>
    <text x="390" y="135" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">2 · 3.3 V RAIL</text>
    <rect x="285" y="168" width="210" height="40" rx="6" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="2"/>
    <text x="390" y="193" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">3 · LED1 LIT</text>
    <rect x="285" y="226" width="210" height="40" rx="6" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="2"/>
    <text x="390" y="251" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">4 · ENUMERATES</text>
    <rect x="285" y="284" width="210" height="40" rx="6" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="2"/>
    <text x="390" y="309" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">5 · LED2 BLINKS</text>
  </g>

  <!-- descending connector arrows between rungs -->
  <g fill="#c8963e">
    <path d="M383,98 h14 l-7,9 z"/>
    <path d="M383,156 h14 l-7,9 z"/>
    <path d="M383,214 h14 l-7,9 z"/>
    <path d="M383,272 h14 l-7,9 z"/>
  </g>

  <!-- right gutter: what proves each rung (proximity labels, no leaders) -->
  <g font-size="10" fill="#8a8a8a">
    <text x="512" y="76">meter stays silent</text>
    <text x="512" y="134">TP1 reads ≈ 3.3 V</text>
    <text x="512" y="192">the power LED is on</text>
    <text x="512" y="250">the host sees the S3</text>
    <text x="512" y="308">your code blinks it — alive</text>
  </g>

  <!-- left gutter: the stop rule, tied to all rungs by a red bracket -->
  <line x1="265" y1="52" x2="265" y2="324" stroke="#ef5350" stroke-width="1.5"/>
  <line x1="265" y1="52" x2="271" y2="52" stroke="#ef5350" stroke-width="1.5"/>
  <line x1="265" y1="324" x2="271" y2="324" stroke="#ef5350" stroke-width="1.5"/>
  <text x="70" y="180" fill="#ef5350" font-size="11" font-weight="700">IF ANY RUNG</text>
  <text x="70" y="195" fill="#ef5350" font-size="11" font-weight="700">FAILS:</text>
  <text x="70" y="214" fill="#ef5350" font-size="11">STOP &amp; fix it</text>
  <text x="70" y="229" fill="#ef5350" font-size="11">before the next</text>

  <!-- takeaway (bottom gutter) -->
  <text x="390" y="344" text-anchor="middle" fill="#8a8a8a" font-size="10">All five rungs clear → log the board BROUGHT_UP.</text>
</svg>
