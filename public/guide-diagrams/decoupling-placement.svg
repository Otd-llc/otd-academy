<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" role="img"
     aria-label="Decoupling capacitor placement: a cap right at the pin makes a small current loop; the same cap placed far makes a large loop that chokes the fast current"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">

  <!-- panel divider (neutral, dashed) -->
  <line x1="390" y1="30" x2="390" y2="278" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="4 5" stroke-opacity="0.5"/>

  <!-- ── Panel A · cap AT the pin (good) ───────────────────────────────────────── -->
  <text x="210" y="46" text-anchor="middle" fill="#4a8fff" font-size="13" font-weight="700">✓  cap right at the pin</text>

  <!-- current loop (small) — filled region, drawn under the wires -->
  <rect x="134" y="128" width="80" height="64" fill="rgba(74,143,255,0.16)"/>
  <!-- IC -->
  <rect x="70" y="96" width="64" height="128" rx="3" fill="rgba(200,150,62,0.12)" stroke="#c8963e" stroke-width="2"/>
  <text x="102" y="167" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">IC</text>
  <!-- power out (top), ground return (bottom), cap closing the loop on the right -->
  <path d="M134,128 H214" fill="none" stroke="#c8963e" stroke-width="2"/>
  <path d="M134,192 H214" fill="none" stroke="#8a8a8a" stroke-width="2"/>
  <path d="M214,128 V154" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
  <line x1="204" y1="154" x2="224" y2="154" stroke="#8a8a8a" stroke-width="1.5"/>
  <line x1="204" y1="160" x2="224" y2="160" stroke="#8a8a8a" stroke-width="1.5"/>
  <path d="M214,160 V192" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
  <!-- region label, centred in the loop -->
  <text x="174" y="164" text-anchor="middle" fill="#4a8fff" font-size="9" font-weight="700">small loop</text>
  <!-- caption (bottom gutter of the panel) -->
  <text x="210" y="252" text-anchor="middle" fill="#8a8a8a" font-size="11">short path · low inductance —</text>
  <text x="210" y="266" text-anchor="middle" fill="#8a8a8a" font-size="11">the cap dumps current fast</text>

  <!-- ── Panel B · cap FAR (bad) ───────────────────────────────────────────────── -->
  <text x="586" y="46" text-anchor="middle" fill="#ef5350" font-size="13" font-weight="700">✗  cap far from the pin</text>

  <!-- current loop (large) -->
  <rect x="514" y="128" width="180" height="64" fill="rgba(239,83,80,0.16)"/>
  <rect x="450" y="96" width="64" height="128" rx="3" fill="rgba(200,150,62,0.12)" stroke="#c8963e" stroke-width="2"/>
  <text x="482" y="167" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">IC</text>
  <path d="M514,128 H694" fill="none" stroke="#c8963e" stroke-width="2"/>
  <path d="M514,192 H694" fill="none" stroke="#8a8a8a" stroke-width="2"/>
  <path d="M694,128 V154" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
  <line x1="684" y1="154" x2="704" y2="154" stroke="#8a8a8a" stroke-width="1.5"/>
  <line x1="684" y1="160" x2="704" y2="160" stroke="#8a8a8a" stroke-width="1.5"/>
  <path d="M694,160 V192" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
  <text x="604" y="164" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="700">big loop</text>
  <text x="586" y="252" text-anchor="middle" fill="#8a8a8a" font-size="11">long path · trace inductance</text>
  <text x="586" y="266" text-anchor="middle" fill="#8a8a8a" font-size="11">chokes the fast current</text>

  <!-- shared takeaway (bottom gutter) -->
  <text x="390" y="314" text-anchor="middle" fill="#c8963e" font-size="11" font-weight="700">Same cap, same schematic — placement decides whether it works.</text>
</svg>
