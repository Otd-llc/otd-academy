<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img"
     aria-label="The build order in three passes. Pass 1: hot-air the module U1 and the USB-C connector J1 onto the bare board. Pass 2: iron-solder the passives, one at a time. Pass 3: fit the through-hole switches, headers and test points."
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">

  <!-- title (top gutter) -->
  <text x="390" y="28" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">The build order — gentler, more local heat at every pass</text>

  <!-- ====== PASS 1 (board cx 195) ====== -->
  <text x="195" y="58" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">PASS 1 · HOT AIR</text>
  <text x="195" y="74" text-anchor="middle" fill="#8a8a8a" font-size="10">U1 + J1 on the bare board</text>
  <rect x="177" y="92" width="36" height="10" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="1.5"/>
  <rect x="120" y="102" width="150" height="196" rx="8" fill="rgba(74,143,255,0.04)" stroke="#c8963e" stroke-width="2"/>
  <rect x="160" y="150" width="70" height="60" fill="rgba(170,170,170,0.10)" stroke="#c8963e" stroke-width="2"/>
  <text x="195" y="185" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">U1</text>
  <rect x="175" y="262" width="40" height="14" rx="2" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="1.5"/>
  <text x="195" y="272" text-anchor="middle" fill="#8a8a8a" font-size="9">J1</text>

  <!-- chevron -->
  <text x="292" y="208" text-anchor="middle" fill="#8a8a8a" font-size="30" font-weight="700">›</text>

  <!-- ====== PASS 2 (board cx 390) ====== -->
  <text x="390" y="58" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">PASS 2 · IRON</text>
  <text x="390" y="74" text-anchor="middle" fill="#8a8a8a" font-size="10">passives, one at a time</text>
  <rect x="372" y="92" width="36" height="10" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="1.5"/>
  <rect x="315" y="102" width="150" height="196" rx="8" fill="rgba(74,143,255,0.04)" stroke="#c8963e" stroke-width="2"/>
  <rect x="355" y="150" width="70" height="60" fill="rgba(170,170,170,0.10)" stroke="#c8963e" stroke-width="2"/>
  <text x="390" y="185" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">U1</text>
  <rect x="370" y="262" width="40" height="14" rx="2" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="1.5"/>
  <!-- passives (small gold rects) -->
  <g fill="#c8963e">
    <rect x="332" y="135" width="11" height="6"/><rect x="438" y="138" width="11" height="6"/>
    <rect x="330" y="225" width="11" height="6"/><rect x="440" y="222" width="6" height="11"/>
    <rect x="356" y="228" width="11" height="6"/><rect x="418" y="230" width="11" height="6"/>
  </g>

  <!-- chevron -->
  <text x="487" y="208" text-anchor="middle" fill="#8a8a8a" font-size="30" font-weight="700">›</text>

  <!-- ====== PASS 3 (board cx 585) ====== -->
  <text x="585" y="58" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">PASS 3 · THROUGH-HOLE</text>
  <text x="585" y="74" text-anchor="middle" fill="#8a8a8a" font-size="10">switches · headers · test points</text>
  <rect x="567" y="92" width="36" height="10" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="1.5"/>
  <rect x="510" y="102" width="150" height="196" rx="8" fill="rgba(74,143,255,0.04)" stroke="#c8963e" stroke-width="2"/>
  <rect x="550" y="150" width="70" height="60" fill="rgba(170,170,170,0.10)" stroke="#c8963e" stroke-width="2"/>
  <text x="585" y="185" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">U1</text>
  <rect x="565" y="262" width="40" height="14" rx="2" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="1.5"/>
  <!-- passives -->
  <g fill="#c8963e">
    <rect x="527" y="135" width="11" height="6"/><rect x="633" y="138" width="11" height="6"/>
    <rect x="525" y="225" width="11" height="6"/><rect x="635" y="222" width="6" height="11"/>
  </g>
  <!-- header pin strips on the side edges -->
  <g fill="#c8963e">
    <rect x="516" y="120" width="6" height="6"/><rect x="516" y="134" width="6" height="6"/><rect x="516" y="148" width="6" height="6"/><rect x="516" y="162" width="6" height="6"/><rect x="516" y="176" width="6" height="6"/>
    <rect x="648" y="120" width="6" height="6"/><rect x="648" y="134" width="6" height="6"/><rect x="648" y="148" width="6" height="6"/><rect x="648" y="162" width="6" height="6"/><rect x="648" y="176" width="6" height="6"/>
  </g>
  <!-- two through-hole switches -->
  <rect x="548" y="232" width="16" height="16" rx="2" fill="none" stroke="#c8963e" stroke-width="1.5"/>
  <rect x="606" y="232" width="16" height="16" rx="2" fill="none" stroke="#c8963e" stroke-width="1.5"/>

  <!-- takeaway (bottom gutter) -->
  <text x="390" y="332" text-anchor="middle" fill="#8a8a8a" font-size="10">Heat-hungry parts first — then the iron, where the heat stays local and nothing already placed gets cooked twice.</text>
</svg>
