<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" role="img"
     aria-label="Current budget: the board draws about 550 mA (a 500 mA Wi-Fi transmit peak plus 50 mA for the rest) against the RT9080 LDO's 600 mA ceiling, leaving roughly 50 mA of headroom"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">

  <!-- title -->
  <text x="390" y="40" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Does it fit under the LDO's 600 mA?</text>

  <!-- ── Bar 1 · what the board DRAWS (≈ 550 mA) ────────────────────────────── -->
  <text x="110" y="92" text-anchor="start" fill="#8a8a8a" font-size="11">What the board draws</text>
  <!-- rest-of-board label, top gutter above its segment, 90° leader down -->
  <text x="635" y="78" text-anchor="middle" fill="#8a8a8a" font-size="11">rest ≈ 50 mA</text>
  <line x1="635" y1="84" x2="635" y2="104" stroke="#8a8a8a" stroke-width="1"/>
  <!-- Wi-Fi TX peak ~500 mA (1 px = 1 mA, origin x=110) -->
  <rect x="110" y="106" width="500" height="46" fill="rgba(200,150,62,0.30)" stroke="#c8963e" stroke-width="2"/>
  <text x="360" y="134" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Wi-Fi TX peak  ≈ 500 mA</text>
  <!-- rest of board ~50 mA -->
  <rect x="610" y="106" width="50" height="46" fill="rgba(74,143,255,0.32)" stroke="#4a8fff" stroke-width="2"/>

  <!-- alignment: where "draws" ends, carried down to the supply bar -->
  <line x1="660" y1="152" x2="660" y2="196" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="4 5" stroke-opacity="0.6"/>

  <!-- ── Bar 2 · what the RT9080 SUPPLIES (600 mA) ──────────────────────────── -->
  <text x="110" y="186" text-anchor="start" fill="#8a8a8a" font-size="11">What the RT9080 LDO supplies</text>
  <!-- used 0..550 (faint) -->
  <rect x="110" y="196" width="550" height="46" fill="rgba(200,150,62,0.10)" stroke="#c8963e" stroke-width="1"/>
  <!-- headroom 550..600 (highlighted — the lesson) -->
  <rect x="660" y="196" width="50" height="46" fill="rgba(200,150,62,0.55)" stroke="#c8963e" stroke-width="2"/>
  <!-- 600 mA ceiling -->
  <line x1="710" y1="190" x2="710" y2="248" stroke="#ef5350" stroke-width="2"/>
  <text x="710" y="182" text-anchor="end" fill="#ef5350" font-size="11" font-weight="700">600 mA ceiling</text>

  <!-- headroom label, bottom gutter, 90° leader up to the highlighted segment -->
  <text x="685" y="282" text-anchor="middle" fill="#c8963e" font-size="11" font-weight="700">headroom ≈ 50 mA</text>
  <line x1="685" y1="266" x2="685" y2="244" stroke="#c8963e" stroke-width="1"/>

  <!-- takeaway -->
  <text x="390" y="308" text-anchor="middle" fill="#c8963e" font-size="11" font-weight="700">Thin but fine — that's why it's a 600 mA part, not a tiny 150 mA one.</text>
</svg>
