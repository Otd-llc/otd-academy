<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img"
     aria-label="A Gerber set as an exploded stack: front silkscreen, front mask, front copper, back copper, back mask, back silkscreen and the Edge.Cuts outline — one flat file per layer — with a drill file piercing the copper layers. Zip them all into one archive."
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">

  <!-- title (top gutter) -->
  <text x="390" y="26" text-anchor="middle" fill="#c8963e" font-size="12" font-weight="700">A Gerber set — one flat file per layer, plus the drill</text>

  <!-- drill callout (top-centre, above the stack) -->
  <text x="450" y="46" text-anchor="middle" fill="#4a8fff" font-size="11" font-weight="700">drill file (.drl)</text>
  <line x1="450" y1="50" x2="450" y2="56" stroke="#4a8fff" stroke-width="1"/>

  <!-- exploded layer bars (subject, centred x 290–490) -->
  <g>
    <!-- F.Silkscreen -->
    <rect x="290" y="58" width="200" height="12" fill="rgba(255,255,255,0.16)" stroke="#8a8a8a" stroke-width="1"/>
    <!-- F.Mask -->
    <rect x="290" y="90" width="200" height="12" fill="rgba(74,143,255,0.16)" stroke="#4a8fff" stroke-width="1"/>
    <!-- F.Cu -->
    <rect x="290" y="122" width="200" height="12" fill="#c8963e" stroke="#c8963e" stroke-width="1"/>
    <!-- B.Cu -->
    <rect x="290" y="154" width="200" height="12" fill="#c8963e" stroke="#c8963e" stroke-width="1"/>
    <!-- B.Mask -->
    <rect x="290" y="186" width="200" height="12" fill="rgba(74,143,255,0.16)" stroke="#4a8fff" stroke-width="1"/>
    <!-- B.Silkscreen -->
    <rect x="290" y="218" width="200" height="12" fill="rgba(255,255,255,0.16)" stroke="#8a8a8a" stroke-width="1"/>
    <!-- Edge.Cuts (outline only) -->
    <rect x="290" y="250" width="200" height="12" fill="none" stroke="#c8963e" stroke-width="1.5"/>
  </g>

  <!-- the drill: a dashed line piercing the stack, circles where it crosses copper -->
  <line x1="450" y1="56" x2="450" y2="268" stroke="#4a8fff" stroke-width="1.2" stroke-dasharray="3 3"/>
  <circle cx="450" cy="128" r="4" fill="#0b0f1a" stroke="#4a8fff" stroke-width="1.2"/>
  <circle cx="450" cy="160" r="4" fill="#0b0f1a" stroke="#4a8fff" stroke-width="1.2"/>

  <!-- left gutter: file names (right-aligned), copper rows brightest -->
  <g font-size="11" text-anchor="end">
    <text x="268" y="68" fill="#8a8a8a">F_Silkscreen.gbr</text>
    <text x="268" y="100" fill="#8a8a8a">F_Mask.gbr</text>
    <text x="268" y="132" fill="#ffffff" font-weight="700">F_Cu.gbr</text>
    <text x="268" y="164" fill="#ffffff" font-weight="700">B_Cu.gbr</text>
    <text x="268" y="196" fill="#8a8a8a">B_Mask.gbr</text>
    <text x="268" y="228" fill="#8a8a8a">B_Silkscreen.gbr</text>
    <text x="268" y="260" fill="#c8963e">Edge_Cuts.gbr</text>
  </g>

  <!-- right gutter: plain-English role (left-aligned) -->
  <g font-size="11" fill="#8a8a8a">
    <text x="512" y="68">the white labels</text>
    <text x="512" y="100">mask — gaps at the pads</text>
    <text x="512" y="132" fill="#c9c9c9">front copper — your traces</text>
    <text x="512" y="164" fill="#c9c9c9">back copper — ground plane</text>
    <text x="512" y="196">mask — gaps at the pads</text>
    <text x="512" y="228">the white labels</text>
    <text x="512" y="260">where the fab cuts the board</text>
  </g>

  <!-- takeaway (bottom gutter) -->
  <text x="390" y="338" text-anchor="middle" fill="#c8963e" font-size="11" font-weight="700">Zip every one of these into a single archive — that zip is the board the fab builds.</text>
</svg>
