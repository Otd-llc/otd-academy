<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img"
     aria-label="Top view of the carrier board: the ESP32-S3-WROOM-1 module sits at the board edge with its PCB antenna overhanging, inside a no-copper keep-out; ground pour fills the rest"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <pattern id="pour" width="9" height="9" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#8a8a8a" stroke-width="1" stroke-opacity="0.32"/>
    </pattern>
  </defs>

  <!-- carrier-board outline, flooded with ground pour (copper) -->
  <rect x="60" y="92" width="660" height="232" rx="8" fill="url(#pour)" stroke="#c8963e" stroke-width="2"/>

  <!-- antenna keep-out: a clear no-copper zone reaching the board edge, around the antenna -->
  <rect x="216" y="92" width="168" height="48" fill="#0b0f1a" stroke="#ef5350" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- WROOM module: PORTRAIT, antenna on the short top edge, mounted at the board edge so the
       antenna end overhangs above the outline (module top y=78 sits above board top y=92) -->
  <!-- RF-shield body (the metal can) -->
  <rect x="248" y="112" width="104" height="113" rx="2" fill="rgba(170,170,170,0.10)" stroke="#c8963e" stroke-width="2"/>
  <!-- antenna keep-out region of the module (above the shield), the PCB-antenna end -->
  <rect x="248" y="78" width="104" height="34" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="2"/>

  <!-- castellated / LGA pads down the two long sides and the bottom edge (none on the antenna end) -->
  <g stroke="#c8963e" stroke-width="2" stroke-opacity="0.8">
    <line x1="248" y1="124" x2="240" y2="124"/><line x1="248" y1="136" x2="240" y2="136"/>
    <line x1="248" y1="148" x2="240" y2="148"/><line x1="248" y1="160" x2="240" y2="160"/>
    <line x1="248" y1="172" x2="240" y2="172"/><line x1="248" y1="184" x2="240" y2="184"/>
    <line x1="248" y1="196" x2="240" y2="196"/><line x1="248" y1="208" x2="240" y2="208"/>
    <line x1="352" y1="124" x2="360" y2="124"/><line x1="352" y1="136" x2="360" y2="136"/>
    <line x1="352" y1="148" x2="360" y2="148"/><line x1="352" y1="160" x2="360" y2="160"/>
    <line x1="352" y1="172" x2="360" y2="172"/><line x1="352" y1="184" x2="360" y2="184"/>
    <line x1="352" y1="196" x2="360" y2="196"/><line x1="352" y1="208" x2="360" y2="208"/>
    <line x1="272" y1="225" x2="272" y2="233"/><line x1="294" y1="225" x2="294" y2="233"/>
    <line x1="316" y1="225" x2="316" y2="233"/><line x1="338" y1="225" x2="338" y2="233"/>
  </g>

  <!-- meandered PCB antenna across the top edge -->
  <path d="M262,106 v-14 h12 v14 h12 v-14 h12 v14 h12 v-14 h12 v14 h12"
        fill="none" stroke="#fff" stroke-width="2"/>

  <!-- module label -->
  <text x="300" y="176" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">U1</text>
  <text x="408" y="172" fill="#fff" font-size="13" font-weight="700">ESP32-S3-WROOM-1</text>
  <line x1="404" y1="167" x2="352" y2="167" stroke="#8a8a8a" stroke-width="1"/>

  <!-- keep-out label -->
  <g fill="#ef5350" text-anchor="middle">
    <text x="132" y="108" font-size="14" font-weight="700">KEEP-OUT</text>
    <text x="132" y="125" font-size="10">no copper</text>
    <text x="132" y="138" font-size="10">no ground pour</text>
  </g>
  <line x1="188" y1="116" x2="216" y2="116" stroke="#ef5350" stroke-width="1"/>

  <!-- antenna leader -->
  <text x="300" y="52" text-anchor="middle" fill="#8a8a8a" font-size="11">PCB antenna</text>
  <line x1="300" y1="58" x2="300" y2="78" stroke="#8a8a8a" stroke-width="1"/>

  <!-- overhang note, pointing at the antenna end above the board edge -->
  <text x="470" y="86" fill="#8a8a8a" font-size="10">antenna end overhangs the board edge</text>
  <text x="470" y="99" fill="#8a8a8a" font-size="10">(or a board cut-out under it)</text>
  <line x1="466" y1="89" x2="356" y2="92" stroke="#8a8a8a" stroke-width="1"/>

  <!-- ground pour leader -->
  <text x="556" y="250" text-anchor="middle" fill="#8a8a8a" font-size="11">ground pour (copper) — everywhere</text>
  <text x="556" y="264" text-anchor="middle" fill="#8a8a8a" font-size="11">except the keep-out</text>
</svg>
