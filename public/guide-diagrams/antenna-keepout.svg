<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img"
     aria-label="Top view of the carrier board: the ESP32-S3-WROOM-1 module sits at the board edge with its PCB antenna overhanging inside a no-copper keep-out; the module's pads sit below the keep-out on the ground pour, which fills the rest"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <pattern id="pour" width="9" height="9" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#8a8a8a" stroke-width="1" stroke-opacity="0.32"/>
    </pattern>
  </defs>

  <!-- carrier-board outline, flooded with ground pour (copper) -->
  <rect x="60" y="88" width="660" height="236" rx="8" fill="url(#pour)" stroke="#c8963e" stroke-width="2"/>

  <!-- antenna keep-out: a clear no-copper band at the board edge, around the antenna ONLY.
       Its bottom stops at the antenna/body boundary, so every pad row sits below it (pads are
       copper and must connect to the board). -->
  <rect x="210" y="88" width="180" height="30" fill="#0b0f1a" stroke="#ef5350" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- WROOM module: PORTRAIT, antenna on the short top edge, mounted at the board edge so the
       antenna end overhangs above the outline (module top y=66 sits above board top y=88) -->
  <!-- antenna end of the module (the PCB-antenna substrate, no pads here) -->
  <rect x="248" y="66" width="104" height="52" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="2"/>
  <!-- RF-shield body (the metal can) -->
  <rect x="248" y="118" width="104" height="120" rx="2" fill="rgba(170,170,170,0.10)" stroke="#c8963e" stroke-width="2"/>

  <!-- castellated / LGA pads down the two long sides and the bottom edge (none on the antenna
       end) — all BELOW the keep-out so they land on copper -->
  <g stroke="#c8963e" stroke-width="2" stroke-opacity="0.85">
    <line x1="248" y1="130" x2="240" y2="130"/><line x1="248" y1="142" x2="240" y2="142"/>
    <line x1="248" y1="154" x2="240" y2="154"/><line x1="248" y1="166" x2="240" y2="166"/>
    <line x1="248" y1="178" x2="240" y2="178"/><line x1="248" y1="190" x2="240" y2="190"/>
    <line x1="248" y1="202" x2="240" y2="202"/><line x1="248" y1="214" x2="240" y2="214"/>
    <line x1="248" y1="226" x2="240" y2="226"/>
    <line x1="352" y1="130" x2="360" y2="130"/><line x1="352" y1="142" x2="360" y2="142"/>
    <line x1="352" y1="154" x2="360" y2="154"/><line x1="352" y1="166" x2="360" y2="166"/>
    <line x1="352" y1="178" x2="360" y2="178"/><line x1="352" y1="190" x2="360" y2="190"/>
    <line x1="352" y1="202" x2="360" y2="202"/><line x1="352" y1="214" x2="360" y2="214"/>
    <line x1="352" y1="226" x2="360" y2="226"/>
    <line x1="272" y1="238" x2="272" y2="246"/><line x1="294" y1="238" x2="294" y2="246"/>
    <line x1="316" y1="238" x2="316" y2="246"/><line x1="338" y1="238" x2="338" y2="246"/>
  </g>

  <!-- meandered PCB antenna across the top edge, inside the keep-out -->
  <path d="M262,112 v-14 h12 v14 h12 v-14 h12 v14 h12 v-14 h12 v14 h12"
        fill="none" stroke="#fff" stroke-width="2"/>

  <!-- ── annotations ─────────────────────────────────────────────────────────────── -->

  <!-- A · PCB antenna (top-centre, straight leader down to the meander) -->
  <text x="300" y="44" text-anchor="middle" fill="#cfcfcf" font-size="11">PCB antenna</text>
  <line x1="300" y1="50" x2="300" y2="66" stroke="#8a8a8a" stroke-width="1"/>

  <!-- B · overhang note (top-right, sits above the board edge so it never touches the pour) -->
  <text x="438" y="48" fill="#8a8a8a" font-size="10">antenna end overhangs the board edge</text>
  <text x="438" y="61" fill="#8a8a8a" font-size="10">(or a board cut-out under it)</text>
  <line x1="432" y1="55" x2="354" y2="74" stroke="#8a8a8a" stroke-width="1"/>

  <!-- C · part name (right of the body) -->
  <text x="414" y="172" fill="#fff" font-size="13" font-weight="700">ESP32-S3-WROOM-1</text>
  <line x1="408" y1="168" x2="352" y2="168" stroke="#8a8a8a" stroke-width="1"/>

  <!-- module ref, centred in the shield body -->
  <text x="300" y="186" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">U1</text>

  <!-- D · keep-out (left, leader reaches into the cleared zone beside the antenna) -->
  <g fill="#ef5350">
    <text x="80" y="100" font-size="14" font-weight="700">KEEP-OUT</text>
    <text x="80" y="118" font-size="10">no copper</text>
    <text x="80" y="132" font-size="10">no ground pour</text>
  </g>
  <line x1="158" y1="96" x2="226" y2="101" stroke="#ef5350" stroke-width="1"/>

  <!-- E · ground pour (open lower-right) -->
  <text x="560" y="250" text-anchor="middle" fill="#8a8a8a" font-size="11">ground pour (copper) — everywhere</text>
  <text x="560" y="264" text-anchor="middle" fill="#8a8a8a" font-size="11">except the keep-out</text>
</svg>
