<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img"
     aria-label="Top view of the board showing the WROOM antenna keep-out"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">
  <defs>
    <pattern id="pour" width="9" height="9" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#8a8a8a" stroke-width="1" stroke-opacity="0.32"/>
    </pattern>
  </defs>

  <!-- PCB outline, flooded with ground pour (copper) -->
  <rect x="60" y="60" width="660" height="252" rx="8" fill="url(#pour)" stroke="#c8963e" stroke-width="2"/>

  <!-- antenna keep-out: a clear no-copper zone reaching the board edge -->
  <rect x="64" y="64" width="196" height="150" fill="#0b0f1a" stroke="#ef5350" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- WROOM module, antenna at its left end (over the keep-out) -->
  <rect x="184" y="92" width="300" height="86" rx="3" fill="rgba(200,150,62,0.12)" stroke="#c8963e" stroke-width="2"/>
  <!-- meandered PCB antenna at the module's left end -->
  <path d="M196,150 v-26 h12 v26 h12 v-26 h12 v26 h12 v-26 h12"
        fill="none" stroke="#fff" stroke-width="2"/>

  <!-- labels -->
  <text x="360" y="140" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">U1 — ESP32-S3-WROOM-1</text>

  <g fill="#ef5350" text-anchor="middle">
    <text x="120" y="150" font-size="14" font-weight="700">KEEP-OUT</text>
    <text x="120" y="167" font-size="10">no copper</text>
    <text x="120" y="180" font-size="10">no ground pour</text>
  </g>

  <!-- antenna leader -->
  <line x1="225" y1="210" x2="225" y2="180" stroke="#8a8a8a" stroke-width="1"/>
  <text x="225" y="226" text-anchor="middle" fill="#8a8a8a" font-size="10">PCB antenna</text>

  <!-- ground pour leader -->
  <text x="560" y="250" text-anchor="middle" fill="#8a8a8a" font-size="11">ground pour (copper) — everywhere</text>
  <text x="560" y="264" text-anchor="middle" fill="#8a8a8a" font-size="11">except the keep-out</text>

  <!-- board-edge note -->
  <text x="120" y="300" text-anchor="middle" fill="#8a8a8a" font-size="10">module overhangs / board cut-out here</text>
</svg>
