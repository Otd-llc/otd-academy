<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img"
     aria-label="Edge-on cross-section of a two-layer board: the top copper carries signal traces and the parts; the bottom copper is one continuous ground plane (the return path); plated vias tie the two layers together through the FR4 core"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">

  <!-- title (top gutter) -->
  <text x="390" y="52" text-anchor="middle" fill="#8a8a8a" font-size="11">A 2-layer board, edge-on</text>

  <!-- ── the slab (x 220..560) ─────────────────────────────────────────────── -->
  <!-- FR4 core (insulator) -->
  <rect x="220" y="172" width="340" height="44" fill="rgba(138,138,138,0.10)" stroke="#8a8a8a" stroke-width="1" stroke-opacity="0.45"/>
  <!-- top copper -->
  <rect x="220" y="158" width="340" height="14" fill="#c8963e"/>
  <!-- bottom copper = one continuous ground plane -->
  <rect x="220" y="216" width="340" height="14" fill="#c8963e"/>
  <!-- plated vias tying top <-> bottom through the core -->
  <rect x="478" y="158" width="8" height="72" fill="#c8963e"/>
  <rect x="524" y="158" width="8" height="72" fill="#c8963e"/>

  <!-- a part sitting on the top copper -->
  <rect x="246" y="136" width="54" height="22" rx="2" fill="rgba(200,150,62,0.18)" stroke="#c8963e" stroke-width="2"/>
  <text x="273" y="151" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">part</text>
  <!-- a signal trace running on the top copper -->
  <path d="M308,165 H420" fill="none" stroke="#4a8fff" stroke-width="2.5"/>

  <!-- ── left gutter: layer names (proximity, right-aligned, 18px off slab) ──── -->
  <text x="202" y="169" text-anchor="end" fill="#ffffff" font-size="12" font-weight="700">top copper</text>
  <text x="202" y="198" text-anchor="end" fill="#8a8a8a" font-size="12" font-weight="700">FR4 core</text>
  <text x="202" y="227" text-anchor="end" fill="#c8963e" font-size="12" font-weight="700">bottom copper</text>

  <!-- ── right gutter: what each conductive layer is for ─────────────────────── -->
  <text x="578" y="161" text-anchor="start" fill="#4a8fff" font-size="11">signal traces</text>
  <text x="578" y="176" text-anchor="start" fill="#4a8fff" font-size="11">+ the parts</text>

  <text x="578" y="216" text-anchor="start" fill="#c8963e" font-size="11" font-weight="700">one continuous</text>
  <text x="578" y="231" text-anchor="start" fill="#c8963e" font-size="11" font-weight="700">ground plane —</text>
  <text x="578" y="246" text-anchor="start" fill="#c8963e" font-size="11" font-weight="700">the return path</text>

  <!-- via callout (top gutter, single 90° leader to the right via) -->
  <text x="528" y="120" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">via</text>
  <text x="528" y="133" text-anchor="middle" fill="#8a8a8a" font-size="10">ties the layers</text>
  <path d="M528,138 V156" fill="none" stroke="#8a8a8a" stroke-width="1"/>

  <!-- ── bottom gutter: takeaway ─────────────────────────────────────────────── -->
  <text x="390" y="320" text-anchor="middle" fill="#c8963e" font-size="11" font-weight="700">Top: signals + parts.  Bottom: one solid ground plane every signal returns through.</text>
</svg>
