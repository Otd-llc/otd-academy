<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img"
     aria-label="Bring-up: with the board powered, probe 3.3 V at TP1 (red) and ground at TP2 (black) with a multimeter reading 3.30 V"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">

  <!-- title (top gutter) -->
  <text x="390" y="26" text-anchor="middle" fill="#c8963e" font-size="12" font-weight="700">Rails first — probe the 3.3 V rail before trusting anything downstream</text>

  <!-- carrier board (top view) -->
  <rect x="40" y="44" width="700" height="184" rx="8" fill="rgba(74,143,255,0.04)" stroke="#c8963e" stroke-width="2"/>

  <!-- WROOM module: PORTRAIT, antenna on the top edge (consistent with the keep-out diagram) -->
  <rect x="96" y="38" width="72" height="26" fill="rgba(200,150,62,0.06)" stroke="#c8963e" stroke-width="2"/>
  <rect x="96" y="64" width="72" height="92" rx="2" fill="rgba(170,170,170,0.10)" stroke="#c8963e" stroke-width="2"/>
  <g stroke="#c8963e" stroke-width="2" stroke-opacity="0.85">
    <line x1="96" y1="76" x2="88" y2="76"/><line x1="96" y1="90" x2="88" y2="90"/>
    <line x1="96" y1="104" x2="88" y2="104"/><line x1="96" y1="118" x2="88" y2="118"/>
    <line x1="96" y1="132" x2="88" y2="132"/><line x1="96" y1="146" x2="88" y2="146"/>
    <line x1="168" y1="76" x2="176" y2="76"/><line x1="168" y1="90" x2="176" y2="90"/>
    <line x1="168" y1="104" x2="176" y2="104"/><line x1="168" y1="118" x2="176" y2="118"/>
    <line x1="168" y1="132" x2="176" y2="132"/><line x1="168" y1="146" x2="176" y2="146"/>
    <line x1="116" y1="156" x2="116" y2="164"/><line x1="132" y1="156" x2="132" y2="164"/><line x1="148" y1="156" x2="148" y2="164"/>
  </g>
  <path d="M110,52 v-10 h11 v10 h11 v-10 h11 v10 h11 v-10" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="132" y="116" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">U1</text>
  <text x="132" y="184" text-anchor="middle" fill="#8a8a8a" font-size="10">ESP32-S3-WROOM-1</text>

  <!-- test points (region labels sit directly above each pad) -->
  <text x="430" y="106" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="700">TP1 · 3V3</text>
  <text x="520" y="106" text-anchor="middle" fill="#c9c9c9" font-size="11" font-weight="700">TP2 · GND</text>
  <circle cx="430" cy="138" r="11" fill="#0b0f1a" stroke="#ef5350" stroke-width="3"/>
  <circle cx="430" cy="138" r="3.5" fill="#0b0f1a" stroke="#ef5350" stroke-width="1"/>
  <circle cx="520" cy="138" r="11" fill="#0b0f1a" stroke="#c9c9c9" stroke-width="3"/>
  <circle cx="520" cy="138" r="3.5" fill="#0b0f1a" stroke="#c9c9c9" stroke-width="1"/>

  <!-- meter leads: physical probe wires run straight up (90°) from the meter to each pad -->
  <line x1="430" y1="262" x2="430" y2="153" stroke="#ef5350" stroke-width="2.5"/>
  <line x1="520" y1="262" x2="520" y2="153" stroke="#c9c9c9" stroke-width="2.5"/>
  <path d="M430,151 l-6,13 h12 z" fill="#ef5350"/>
  <path d="M520,151 l-6,13 h12 z" fill="#c9c9c9"/>

  <!-- multimeter -->
  <rect x="340" y="262" width="200" height="82" rx="6" fill="rgba(74,143,255,0.08)" stroke="#c8963e" stroke-width="2"/>
  <rect x="360" y="278" width="160" height="38" rx="3" fill="#0b0f1a" stroke="#2a3340" stroke-width="1"/>
  <text x="476" y="306" text-anchor="end" fill="#8fe3a0" font-size="22" font-weight="700">3.30</text>
  <text x="492" y="306" text-anchor="end" fill="#8fe3a0" font-size="12">V</text>
  <text x="352" y="334" fill="#8a8a8a" font-size="10">DMM · DC volts</text>
  <circle cx="430" cy="262" r="3.5" fill="#ef5350"/>
  <circle cx="520" cy="262" r="3.5" fill="#c9c9c9"/>
</svg>
