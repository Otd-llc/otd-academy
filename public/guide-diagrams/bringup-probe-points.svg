<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" role="img"
     aria-label="Bring-up: probing the 3.3 V rail at TP1 and ground at TP2"
     font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">

  <!-- board + module (context) -->
  <rect x="50" y="40" width="680" height="170" rx="8" fill="rgba(74,143,255,0.04)" stroke="#c8963e" stroke-width="2"/>
  <rect x="84" y="60" width="320" height="74" rx="3" fill="rgba(200,150,62,0.12)" stroke="#c8963e" stroke-width="2"/>
  <text x="244" y="102" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">U1 — ESP32-S3-WROOM-1</text>

  <!-- test points -->
  <circle cx="470" cy="150" r="11" fill="#0b0f1a" stroke="#ef5350" stroke-width="3"/>
  <circle cx="470" cy="150" r="3.5" fill="#0b0f1a" stroke="#ef5350" stroke-width="1"/>
  <circle cx="560" cy="150" r="11" fill="#0b0f1a" stroke="#c9c9c9" stroke-width="3"/>
  <circle cx="560" cy="150" r="3.5" fill="#0b0f1a" stroke="#c9c9c9" stroke-width="1"/>
  <text x="470" y="120" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="700">TP1 · 3V3</text>
  <text x="560" y="120" text-anchor="middle" fill="#c9c9c9" font-size="11" font-weight="700">TP2 · GND</text>

  <!-- meter leads (red + on TP1, black - on TP2) -->
  <path d="M350,260 L470,164" fill="none" stroke="#ef5350" stroke-width="2.5"/>
  <path d="M430,260 L560,164" fill="none" stroke="#c9c9c9" stroke-width="2.5"/>
  <!-- probe tips -->
  <path d="M470,162 l-6,13 h12 z" fill="#ef5350"/>
  <path d="M560,162 l-6,13 h12 z" fill="#c9c9c9"/>

  <!-- multimeter -->
  <rect x="300" y="262" width="180" height="78" rx="6" fill="rgba(74,143,255,0.08)" stroke="#c8963e" stroke-width="2"/>
  <rect x="320" y="278" width="140" height="36" rx="3" fill="#0b0f1a" stroke="#2a3340" stroke-width="1"/>
  <text x="438" y="305" text-anchor="end" fill="#8fe3a0" font-size="22" font-weight="700">3.30</text>
  <text x="452" y="305" text-anchor="end" fill="#8fe3a0" font-size="12">V</text>
  <text x="328" y="332" fill="#8a8a8a" font-size="10">DMM · DC volts</text>
  <circle cx="350" cy="262" r="3.5" fill="#ef5350"/>
  <circle cx="430" cy="262" r="3.5" fill="#c9c9c9"/>

  <!-- takeaway legend (top-right, clear of the test points) -->
  <text x="700" y="78" text-anchor="end" fill="#ef5350" font-size="12" font-weight="700">red → TP1 (3V3)</text>
  <text x="700" y="96" text-anchor="end" fill="#c9c9c9" font-size="12" font-weight="700">black → TP2 (GND)</text>
</svg>
